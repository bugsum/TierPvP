# TierPvP - Level Configuration
# Define the weapon/armor progression chain.
# Players start at level 1 and advance on each kill.
# The LAST level is the final level — getting a kill here wins the game.
#
# Each level supports:
#   display-name    - MiniMessage formatted name shown in chat/scoreboard
#   weapon          - The weapon given to the player
#   extras          - Additional items (e.g., arrows for bows)
#   armor           - Armor pieces (helmet, chestplate, leggings, boots)
#
# Item options (weapon, extras, armor pieces):
#   material        - Bukkit material name (e.g., DIAMOND_SWORD)
#   slot            - Inventory slot (0-8 for hotbar, 9+ for inventory)
#   amount          - Stack size (default: 1)
#   name            - Custom display name (MiniMessage format)
#   lore            - List of lore lines (MiniMessage format)
#   enchantments    - Map of enchantment_name: level (use lowercase names)
#                     Examples: sharpness, protection, power, quick_charge
#   item-flags      - List of ItemFlag names to hide info
#                     Examples: HIDE_ENCHANTS, HIDE_ATTRIBUTES, HIDE_UNBREAKABLE
#
# Armor pieces are optional — omit any piece the player shouldn't have.

levels:
  1:
    display-name: "<gray>Wooden Axe"
    weapon:
      material: WOODEN_AXE
      slot: 0
    extras: []
    armor: {}
  2:
